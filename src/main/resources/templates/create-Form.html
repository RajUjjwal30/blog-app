<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:replace="fragments/header :: header">
</div>
<body>
<div th:replace="fragments/header :: navbar"></div>
<div class="container">
    <div class="row col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h2 class="text-center">Create Post</h2>
            </div>
            <div class="card-body">
                <form role="form" method="post" th:action="@{/blog/posts}" th:object="${post}">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input
                        type="text"
                        class="form-control"
                        id="title"
                        placeholder="Enter post title"
                        name="title"
                        th:field="*{title}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Excerpt</label>
                        <textarea
                            class="form-control"
                            id="excerpt"
                            placeholder="Enter short description"
                            rows="3"
                            name="excerpt"
                            th:field="*{excerpt}">
                        </textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea
                                class="form-control"
                                id="content"
                                placeholder="Write a beautiful thought... !"
                                rows="12"
                                name="content"
                                th:field="*{content}">
                        </textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Author</label>
                        <input
                                type="text"
                                class="form-control"
                                placeholder="Author name"
                                th:field="*{author}">
                    </div>
<!--                    <div class="mb-3">-->
<!--                        <label class="form-label">Published DateTime</label>-->
<!--                        <input-->
<!--                                type="datetime-local"-->
<!--                                class="form-control"-->
<!--                                id="published_at"-->
<!--                                name="published_at"-->
<!--                                th:field="*{publishedAt}">-->
<!--                    </div>-->
                    <div class="mb-3">
                        <label class="form-label">Tags to attach :</label>
                        <input
                                type="text"
                                class="form-control"
                                id="customTags"
                                name="customTags"
                        >
                    </div>
                    <button type="submit" class="btn btn-success">publish</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
