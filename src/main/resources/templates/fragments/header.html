<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <title>All Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary style=background-color: #e3f2fd;" data-bs-theme="light" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Thoughts</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/blog/posts}">Posts</a>
                </li>
                <!--        <li class="nav-item dropdown">-->
                <!--          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">-->
                <!--            Filter-->

                <!--            <li><a class="dropdown-item" href="#">Author</a></li>-->

                <!--            <li><hr class="dropdown-divider"></li>-->
                <!--            <li><a class="dropdown-item" href="#">Something else here</a></li>-->
                <!--          </ul>-->
                <!--        </li>-->
                <button type="button" class="btn btn-success">
                    <a style="color: white" th:href="@{/blog/posts/create}">Create Post</a></button>

            </ul>

        <form th:action="@{/blog/posts}" method="get" class="d-flex">

            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search posts..."
                   th:value="${search}" />

            <input type="hidden" name="start" value="1"/>
            <input type="hidden" name="limit" th:value="${limit}" />
            <input type="hidden" name="sortBy" th:value="${sortBy}" />
            <input type="hidden" name="direction" th:value="${direction}" />

            <button type="submit" class="btn btn-success ms-2">
                Search
            </button>
        </form>
        </div>
    </div>
</nav>
</body>
</html>
