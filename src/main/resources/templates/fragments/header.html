<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="header">
    <meta charset="UTF-8">
    <title>All Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color: #e3f2fd;" data-bs-theme="light" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Thoughts</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/blog/posts}">Posts</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('AUTHOR','ADMIN')">
                    <button type="button" class="btn btn-success">
                        <a style="color: white" th:href="@{/blog/posts/create}">Create Post</a></button>
                </li>
            </ul>

            <!-- Search form (standalone, no nesting) -->
            <form th:action="@{/blog/posts}" method="get" class="d-flex me-2">
                <input type="text"
                       name="search"
                       class="form-control"
                       placeholder="Search posts..."
                       th:value="${search}" />
                <button type="submit" class="btn btn-success ms-2">
                    Search
                </button>
            </form>

            <!-- User info + logout OR login/register links (outside the search form) -->
            <ul class="navbar-nav">

                <!-- Logged in -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
          <span class="navbar-text me-2">
            Hello, <strong sec:authentication="name"></strong>
            <span sec:authorize="hasRole('ADMIN')"
                  class="badge bg-danger ms-1">Admin</span>
            <span sec:authorize="hasRole('AUTHOR')"
                  class="badge bg-primary ms-1">Author</span>
          </span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn btn-outline-dark btn-sm">Logout</button>
                    </form>
                </li>

                <!-- Not logged in -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-dark btn-sm me-2"
                       th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-dark btn-sm"
                       th:href="@{/register}">Register</a>
                </li>
            </ul>

        </div>
    </div>
</nav>
</body>
</html>
