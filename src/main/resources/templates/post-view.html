<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:replace="fragments/header ::header"></div>
<div th:replace="fragments/header ::navbar"></div>
    <div class="container">
        <style>
            .mb-3{
                margin-left: 10px;
                padding-left: 7.5px;
            }
        </style>
        <h1 th:text="${post.title}"></h1>

        <div style="margin-bottom:15px"
             th:if="${isOwner or isAdmin}">
            <a th:href="@{/blog/posts/update/{postId}(postId=${post.id})}"
               class="btn btn-warning btn-sm">Edit Post</a>
            <form th:action="@{/blog/posts/delete/{postId}(postId=${post.id})}"
                  method="post" style="display:inline;"
                  onsubmit="return confirm('Delete this post?')">
                <button type="submit" class="btn btn-danger btn-sm">Delete Post</button>
            </form>
        </div>

        <p>
            <strong>Author:</strong>
            <span th:text="${post.author}"></span>
        </p>

        <p>
            <strong>Published:</strong>
            <span th:text="${post.publishedAt}"></span>
        </p>

        <h3>Tags</h3>

        <ul>
            <li th:each="tag : ${post.tags}"
                th:text="${tag}">
            </li>
        </ul>

        <hr>

        <div th:text="${post.content}"></div>
    </div>
    <hr>
    <hr>
    <div class="card">
        <div class="card-header">
            <h2>Leave a Comment</h2>
        </div>
        <div class="card-body">
        <form th:action="@{/blog/comments}"
              method="post"
              th:object="${commentDto}">

        <div class="mb-3">
            <input type="text"
                   class="form-control"
                   placeholder="Your Name"
                   th:field="*{name}" />
        </div>

        <div class="mb-3">
            <input type="email"
                   class="form-control"
                   placeholder="Your Email"
                   th:field="*{email}" />
        </div>

        <div class="mb-3">
        <textarea class="form-control"
                  placeholder="Write your comment..."
                  th:field="*{content}">
        </textarea>
        </div>

        <!-- IMPORTANT: Hidden postId -->
        <input type="hidden"
               name="postId"
               th:value="${post.id}" />

        <button type="submit" class="btn btn-primary"  style="margin: 10px;">
            Add Comment
        </button>
    </form>
            <h3>Comments</h3>

            <div th:if="${#lists.isEmpty(comments)}">
                <p>No comments yet</p>
            </div>

            <div th:each="comment : ${comments}" class="card mb-2">
                <div class="card-body">
                    <h5 th:text="${comment.name}"></h5>

                    <!-- Normal view -->
                    <p th:id="'comment-text-' + ${comment.id}"
                       th:text="${comment.content}"></p>

                    <!-- Inline edit form (hidden by default, shown via JS) -->
                    <form th:if="${isOwner or isAdmin}"
                          th:id="'edit-form-' + ${comment.id}"
                          th:action="@{/blog/comments/update/{id}(id=${comment.id})}"
                          method="post"
                          style="display:none; margin-top:8px;">
                        <input type="hidden" name="postId" th:value="${post.id}" />
                        <textarea name="content" rows="3" class="form-control mb-2"
                                  th:text="${comment.content}"></textarea>
                        <button type="submit" class="btn btn-sm btn-primary">Save</button>
                        <button type="button" class="btn btn-sm btn-secondary"
                                th:onclick="'toggleEdit(' + ${comment.id} + ')'">Cancel</button>
                    </form>

                    <small th:text="${comment.email}"></small>

                    <!-- Delete + Edit actions (post owner or admin only) -->
                    <div th:if="${isOwner or isAdmin}" class="mt-2 d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary"
                                th:onclick="'toggleEdit(' + ${comment.id} + ')'">Edit</button>
                        <form th:action="@{/blog/comments/delete/{id}(id=${comment.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Delete this comment?')">
                            <input type="hidden" name="postId" th:value="${post.id}" />
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
function toggleEdit(commentId) {
    const text = document.getElementById('comment-text-' + commentId);
    const form = document.getElementById('edit-form-' + commentId);
    const hidden = text.style.display === 'none';
    text.style.display = hidden ? '' : 'none';
    form.style.display = hidden ? 'none' : 'block';
}
</script>
</body>
</html>
