<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head></head>
<body style="background:#fff; color:#000;">
<div th:replace="fragments/header ::header"></div>
<div th:replace="fragments/header ::navbar"></div>

<div class="container mt-4">

  <!-- Filter Bar -->
  <div style="border: 2px solid #000; padding: 16px; margin-bottom: 28px;">
    <form th:action="@{/blog/posts}" method="get" class="row g-3 align-items-end">
      <input type="hidden" name="search" th:value="${search}" />

      <div class="col-md-3">
        <label class="form-label small fw-bold text-uppercase" for="author" style="color:#000;">Author</label>
        <select id="author" name="authorId" class="form-select form-select-sm"
                style="border-color:#000; border-radius:0;">
          <option value="">All authors</option>
          <option th:each="author : ${authors}"
                  th:value="${author.id}"
                  th:text="${author.name}"
                  th:selected="${selectedAuthorId != null and author.id == selectedAuthorId}">
          </option>
        </select>
      </div>

      <!-- Tags Dropdown -->
      <div class="col-md-3" style="position: relative;">
        <label class="form-label small fw-bold text-uppercase" style="color:#000;">Tags</label>
        <div id="tagDropdownTrigger"
             class="form-select form-select-sm d-flex align-items-center justify-content-between"
             style="cursor:pointer; user-select:none; min-height:31px; border-color:#000; border-radius:0;"
             onclick="toggleTagDropdown()">
          <span id="tagDropdownLabel" class="small" style="color:#555;">All tags</span>
          <span id="tagCaret" style="transition: transform .2s;">&#9662;</span>
        </div>
        <div id="tagDropdownPanel"
             style="display:none; position:absolute; z-index:1000; width:100%; left:0;
                    max-height:220px; overflow-y:auto; margin-top:2px;
                    border: 1px solid #000; background:#fff;">
          <div th:each="tag : ${tags}" class="form-check px-3 py-1">
            <input class="form-check-input tag-checkbox" type="checkbox"
                   th:id="'tag-' + ${tag.id}" name="tagIds" th:value="${tag.id}"
                   th:checked="${selectedTagIds != null and selectedTagIds.contains(tag.id)}"
                   onchange="updateTagLabel()" style="border-color:#000;" />
            <label class="form-check-label small" th:for="'tag-' + ${tag.id}" th:text="${tag.name}"></label>
          </div>
          <div th:if="${tags == null or tags.isEmpty()}" class="px-3 py-2 small" style="color:#555;">
            No tags available
          </div>
        </div>
      </div>

      <div class="col-md-2">
        <label class="form-label small fw-bold text-uppercase" for="direction" style="color:#000;">Order</label>
        <select id="direction" name="direction" class="form-select form-select-sm"
                style="border-color:#000; border-radius:0;">
          <option value="desc" th:selected="${direction == 'desc'}">Newest first</option>
          <option value="asc"  th:selected="${direction == 'asc'}">Oldest first</option>
        </select>
      </div>

      <div class="col-auto d-flex gap-2">
        <button type="submit" class="btn btn-sm"
                style="background:#000; color:#fff; border-radius:0;">Apply</button>
        <a th:href="@{/blog/posts}" class="btn btn-sm"
           style="border:1px solid #000; color:#000; border-radius:0;">Reset</a>
      </div>
    </form>
  </div>

  <!-- Page Heading -->
  <h2 style="font-weight:800; letter-spacing:1px; border-bottom:3px solid #000; padding-bottom:8px; margin-bottom:24px;">
    POSTS
  </h2>

  <!-- No results -->
  <div th:if="${#lists.isEmpty(posts)}"
       style="text-align:center; padding:60px 0; color:#555;">
    <p style="font-size:1.1rem;">No posts found.</p>
    <a th:href="@{/blog/posts}" style="color:#000; text-decoration:underline;">Clear filters</a>
  </div>

  <!-- Post Grid: 2 columns, 3 rows = 6 per page -->
  <div class="row row-cols-1 row-cols-md-2 g-4" th:if="${not #lists.isEmpty(posts)}">
    <div class="col" th:each="post : ${posts}">
      <div style="border: 2px solid #000; padding: 20px; height:100%;
                  display:flex; flex-direction:column; background:#fff;">

        <!-- Tags -->
        <div style="margin-bottom:8px;">
          <span th:each="tag : ${post.tags}"
                th:text="${tag}"
                style="font-size:0.7rem; font-weight:700; text-transform:uppercase;
                       letter-spacing:1px; border:1px solid #000; padding:2px 6px;
                       margin-right:4px; color:#000; background:#fff;">
          </span>
        </div>

        <!-- Title -->
        <h4 style="font-weight:800; margin-bottom:8px; flex-grow:0;">
          <a th:href="@{/blog/posts/{id}(id=${post.id})}"
             th:text="${post.title}"
             style="color:#000; text-decoration:none;">
          </a>
        </h4>

        <!-- Meta -->
        <p style="font-size:0.8rem; color:#555; margin-bottom:10px;">
          <strong th:text="${post.author}" style="color:#000;"></strong>
          &nbsp;·&nbsp;
          <span th:text="${post.publishedAt != null ? #temporals.format(post.publishedAt, 'dd MMM yyyy') : ''}"></span>
        </p>

        <!-- Excerpt -->
        <p th:text="${post.excerpt}" style="flex-grow:1; color:#333; font-size:0.95rem;"></p>

        <!-- Footer: Read more + actions -->
        <div style="margin-top:12px; display:flex; align-items:center; gap:8px;">
          <a th:href="@{/blog/posts/{id}(id=${post.id})}"
             style="font-size:0.85rem; font-weight:700; text-transform:uppercase;
                    letter-spacing:1px; color:#000; text-decoration:underline;">
            Read →
          </a>
          <span sec:authorize="hasAnyRole('AUTHOR','ADMIN')" style="margin-left:auto; display:flex; gap:6px;">
            <a th:href="@{/blog/posts/update/{id}(id=${post.id})}"
               style="font-size:0.78rem; border:1px solid #000; padding:2px 8px;
                      color:#000; text-decoration:none; font-weight:600;">Edit</a>
            <form th:action="@{/blog/posts/delete/{id}(id=${post.id})}"
                  method="post" style="display:inline;"
                  onsubmit="return confirm('Delete this post?')">
              <button type="submit"
                      style="font-size:0.78rem; border:1px solid #000; padding:2px 8px;
                             background:#000; color:#fff; font-weight:600; cursor:pointer;">
                Delete
              </button>
            </form>
          </span>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- Pagination -->
<div th:replace="fragments/footer ::pagination"></div>

<script>
  function toggleTagDropdown() {
    const panel = document.getElementById('tagDropdownPanel');
    const caret = document.getElementById('tagCaret');
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    caret.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  function updateTagLabel() {
    const checked = document.querySelectorAll('.tag-checkbox:checked');
    const label = document.getElementById('tagDropdownLabel');
    if (checked.length === 0) {
      label.textContent = 'All tags';
      label.style.color = '#555';
    } else {
      const names = [...checked].map(cb =>
        document.querySelector(`label[for="${cb.id}"]`).textContent.trim()
      );
      label.textContent = names.length > 2
        ? `${names.slice(0, 2).join(', ')} +${names.length - 2}`
        : names.join(', ');
      label.style.color = '#000';
    }
  }

  document.addEventListener('click', function (e) {
    const trigger = document.getElementById('tagDropdownTrigger');
    const panel = document.getElementById('tagDropdownPanel');
    if (!trigger.contains(e.target) && !panel.contains(e.target)) {
      panel.style.display = 'none';
      document.getElementById('tagCaret').style.transform = 'rotate(0deg)';
    }
  });

  updateTagLabel();
</script>
</body>
</html>
