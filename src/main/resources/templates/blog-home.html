<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Posts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary style=background-color: #e3f2fd;" data-bs-theme="light" >
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Thoughts</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/blog/posts}">Posts</a>
        </li>
<!--        <li class="nav-item dropdown">-->
<!--          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">-->
<!--            Filter-->
<!--          </a>-->
<!--          <ul class="dropdown-menu">-->
<!--            <li><a class="dropdown-item" href="#">Author</a></li>-->
<!--            <li><a class="dropdown-item" href="#">Another action</a></li>-->
<!--            <li><hr class="dropdown-divider"></li>-->
<!--            <li><a class="dropdown-item" href="#">Something else here</a></li>-->
<!--          </ul>-->
<!--        </li>-->
        <button type="button" class="btn btn-success">Create Thought</button>
      </ul>

      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>
<div class="container">
  <div class="row">
    <h1>Posts that you can Enjoy!</h1>
  </div>
  <table class="table table-striped table-hover table-bordered">
    <thead class="table-primary">
    <th style="width:10%">Id</th>
    <th style="width:20%">Title</th>
    <th style="width:10%">Excerpt</th>
    <th style="width:10%">Author</th>
    <th style="width:10%">Published Date</th>
    <th style="width:10%">Tags</th>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">

      <td th:text="${post.id}">1</td>

      <td>
        <a th:href="@{/posts/{id}(id=${post.id})}"
           th:text="${post.title}"
           class="text-decoration-none fw-bold">Post Title</a>
      </td>

      <td th:text="${post.excerpt}">Post excerpt goes here...</td>

      <td>Admin</td>

      <td th:text="${post.published_at != null ? #temporals.format(post.published_at, 'MMM dd, yyyy') : 'No Date'}">Date</td>

      <td>
                <span th:each="postTag : ${post.postTags}"
                      th:text="${postTag.tag.name}"
                      class="badge bg-secondary me-1">
                </span>
      </td>

    </tr>
    </tbody>
  </table>
</div>
<footer>
  <nav aria-label="Page navigation example">
    <ul class="pagination justify-content-center">
      <li class="page-item disabled">
        <a class="page-link">Previous</a>
      </li>
      <li class="page-item"><a class="page-link" href="#">1</a></li>
      <li class="page-item"><a class="page-link" href="#">2</a></li>
      <li class="page-item"><a class="page-link" href="#">3</a></li>
      <li class="page-item">
        <a class="page-link" href="#">Next</a>
      </li>
    </ul>
  </nav>
</footer>
</body>
</html>
