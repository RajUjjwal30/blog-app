<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:replace="fragments/header ::header"></div>
<div th:replace="fragments/header ::navbar"></div>
<div class="container mt-4">

  <div class="card p-3 mb-4">
    <form th:action="@{/blog/posts}" method="get" class="row g-3 align-items-end">
      <input type="hidden" name="search" th:value="${search}" />
      <div class="col-md-3">
        <label class="form-label small fw-semibold text-uppercase text-muted" for="author">Author</label>
        <select id="author" name="authorId" class="form-select form-select-sm">
          <option value="">All authors</option>
          <option th:each="author : ${authors}"
                  th:value="${author.id}"
                  th:text="${author.name}"
                  th:selected="${authors != null and authors.contains(author.id)}">
          </option>
        </select>
      </div>

      <!-- Tags Dropdown Checkbox -->
      <div class="col-md-3" style="position: relative;">
        <label class="form-label small fw-semibold text-uppercase text-muted">Tags</label>

        <!-- Trigger -->
        <div id="tagDropdownTrigger"
             class="form-select form-select-sm d-flex align-items-center justify-content-between"
             style="cursor:pointer; user-select:none; min-height:31px;"
             onclick="toggleTagDropdown()">
          <span id="tagDropdownLabel" class="text-muted small">All tags</span>
          <span id="tagCaret" style="transition: transform .2s;">&#9662;</span>
        </div>

        <!-- Panel -->
        <div id="tagDropdownPanel"
             class="border rounded bg-white shadow-sm"
             style="display:none; position:absolute; z-index:1000; width:100%;left:0; max-height:220px; overflow-y:auto; margin-top:2px;">
          <div th:each="tag : ${tags}" class="form-check px-3 py-1">
            <input
                    class="form-check-input tag-checkbox"
                    type="checkbox"
                    th:id="'tag-' + ${tag.id}"
                    name="tagIds"
                    th:value="${tag.id}"
                    th:checked="${selectedTagIds != null and selectedTagIds.contains(tag.id)}"
                    onchange="updateTagLabel()"
            />
            <label class="form-check-label small" th:for="'tag-' + ${tag.id}" th:text="${tag.name}">
            </label>
          </div>
          <div th:if="${tags == null or tags.isEmpty()}" class="px-3 py-2 text-muted small">
            No tags available
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <label class="form-label small fw-semibold text-uppercase text-muted" for="sortField">Sort By</label>
        <select id="sortField" name="sortField" class="form-select form-select-sm">
          <option value="publishedAt" th:selected="${sortField == 'publishedAt'}">Published Date</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="form-label small fw-semibold text-uppercase text-muted" for="direction">Order</label>
        <select id="direction" name="direction" class="form-select form-select-sm">
          <option value="asc" th:selected="${order == 'asc'}">Ascending</option>
          <option value="desc" th:selected="${order == 'desc'}">Descending</option>
        </select>
      </div>

      <div class="col-auto d-flex gap-2">
        <button type="submit" class="btn btn-dark btn-sm">Apply</button>
        <a th:href="@{/blog/posts}" class="btn btn-outline-secondary btn-sm">Reset</a>
      </div>

    </form>
  </div>

  <h1>Posts that you can Enjoy!</h1>
  <div th:each="post : ${posts}" class="card mb-4 p-3">
    <h3>
      <a th:href="@{/blog/posts/{id}(id=${post.id})}" th:text="${post.title}"></a>
    </h3>
    <p>
      <strong th:text="${post.author}"></strong>
      |
      <span th:text="${post.publishedAt != null ? #temporals.format(post.publishedAt, 'dd MMM yyyy') : 'N/A'}"></span>
    </p>
    <div>
      <strong>Tags:</strong>
      <span th:each="tag : ${post.tags}" th:text="${tag}" class="badge bg-secondary me-1"></span>
    </div>
    <p th:text="${post.excerpt}"></p>
  </div>

</div>
<div th:replace="fragments/footer ::footer"></div>

<script>
  function toggleTagDropdown() {
    const panel = document.getElementById('tagDropdownPanel');
    const caret = document.getElementById('tagCaret');
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    caret.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  function updateTagLabel() {
    const checked = document.querySelectorAll('.tag-checkbox:checked');
    const label = document.getElementById('tagDropdownLabel');
    if (checked.length === 0) {
      label.textContent = 'All tags';
      label.classList.add('text-muted');
    } else {
      const names = [...checked].map(cb =>
              document.querySelector(`label[for="${cb.id}"]`).textContent.trim()
      );
      label.textContent = names.length > 2
              ? `${names.slice(0, 2).join(', ')} +${names.length - 2}`
              : names.join(', ');
      label.classList.remove('text-muted');
    }
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function (e) {
    const trigger = document.getElementById('tagDropdownTrigger');
    const panel = document.getElementById('tagDropdownPanel');
    if (!trigger.contains(e.target) && !panel.contains(e.target)) {
      panel.style.display = 'none';
      document.getElementById('tagCaret').style.transform = 'rotate(0deg)';
    }
  });

  // Restore label on page load if tags were pre-selected
  updateTagLabel();
</script>
</body>
</html>
